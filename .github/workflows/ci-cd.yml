name: PSI CI/CD Pipeline

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Back-end

env:
  PYTHON_VERSION: "3.11.11"
  POETRY_VERSION: "2.4.1"

jobs:

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install

      - name: Ruff lint
        run: poetry run ruff check app tests

      - name: Ruff format
        run: poetry run ruff format --check app tests

      - name: Mypy
        run: poetry run mypy app --ignore-missing-imports


  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: psi
          POSTGRES_PASSWORD: psi_secret
          POSTGRES_DB: paysentineliq_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://psi:psi_secret@localhost:5432/paysentineliq_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: test

        run: |
          poetry run pytest tests \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Back-end/coverage.xml


  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@v3


  owasp-zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install

      - name: Start containers
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres redis

      - name: Wait for postgres
        run: |
          timeout 30 sh -c 'until pg_isready -h localhost -p 5432 -U psi; do sleep 2; done'

      - name: Start API & ZAP scan
        env:
          DATABASE_URL: postgresql+asyncpg://psi:psi_secret@localhost:5432/paysentineliq
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: zap-scan-secret-key-for-ci
          ENVIRONMENT: test
        run: |
          # ── 1. Start API in background ──
          nohup poetry run uvicorn app.main:create_app \
            --factory \
            --host 0.0.0.0 \
            --port 8000 > /tmp/api.log 2>&1 &

          # ── 2. Wait for health endpoint ──
          echo "Waiting for API at http://localhost:8000/health ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is ready (attempt $i)"
              break
            fi
            echo "  ... attempt $i"
            sleep 1
          done

          # ── 3. Run ZAP baseline scan via Docker ──
          # (Using docker run directly instead of the action so the API
          #  background process stays alive in the same step.)
          docker run \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html

          # Capture exit code but don't fail the build on ZAP findings
          ZAP_EXIT=$?
          echo "ZAP scan exit code: $ZAP_EXIT"
          exit $ZAP_EXIT

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            report_json.json
            report_md.md
            report_html.html


  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./Back-end
          file: ./Back-end/docker/Dockerfile
          push: false
          load: true
          tags: paysentineliq:ci

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: paysentineliq:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH


  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest

    needs:
      - test
      - codeql
      - docker

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: echo "Deploying..."