name: PSI CI/CD Pipeline

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Back-end

env:
  PYTHON_VERSION: "3.11.11"
  POETRY_VERSION: "2.4.1"

jobs:

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install

      - name: Mypy
        run: poetry run mypy app --ignore-missing-imports


  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: psi
          POSTGRES_PASSWORD: psi_secret
          POSTGRES_DB: paysentineliq_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://psi:psi_secret@localhost:5432/paysentineliq_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: test

        run: |
          poetry run pytest tests \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Back-end/coverage.xml


  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@v3


  owasp-zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install

      - name: Start containers
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres redis

          # Wait for both containers to become healthy (max 45s)
          for i in $(seq 1 45); do
            PG_OK=$(docker compose -f docker/docker-compose.yml exec -T postgres \
              pg_isready -U psi -d paysentineliq > /dev/null 2>&1 && echo 1 || echo 0)
            RD_OK=$(docker compose -f docker/docker-compose.yml exec -T redis \
              redis-cli ping > /dev/null 2>&1 && echo 1 || echo 0)
            if [ "$PG_OK" = "1" ] && [ "$RD_OK" = "1" ]; then
              echo "Both postgres and redis are healthy"
              break
            fi
            echo "  ... waiting (pg=$PG_OK redis=$RD_OK) attempt $i"
            sleep 1
          done

      - name: Start API & ZAP scan
        env:
          DATABASE_URL: postgresql+asyncpg://psi:psi_secret@localhost:5432/paysentineliq
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: zap-scan-secret-key-for-ci
          ENVIRONMENT: test
        run: |
          # ── 1. Start API in background ──
          nohup poetry run uvicorn app.main:create_app \
            --factory \
            --host 0.0.0.0 \
            --port 8000 > /tmp/api.log 2>&1 &
          API_PID=$!
          echo "API PID: $API_PID"

          # ── 2. Wait for health endpoint (up to 45s) ──
          echo "Waiting for API at http://localhost:8000/health ..."
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API ready at attempt $i"
              break
            fi
            # Every 10 attempts dump the log to help debug
            if [ $((i % 10)) -eq 0 ]; then
              echo "--- Last lines from API log (attempt $i) ---"
              tail -20 /tmp/api.log 2>/dev/null || echo "(log empty)"
            fi
            sleep 1
          done

          # ── 3. Verify API process is still alive ──
          if ! kill -0 "$API_PID" 2>/dev/null; then
            echo "ERROR: API process died. Full log:"
            cat /tmp/api.log
            exit 1
          fi
          echo "API process is running (PID $API_PID)"

          # ── 4. Run ZAP baseline scan via Docker ──
          # Ensure the target dir is world-writable so the ZAP container
          # (running as the `zap` user) can write reports.
          TARGET_DIR="${{ github.workspace }}/Back-end"
          mkdir -p "$TARGET_DIR"
          chmod 777 "$TARGET_DIR"

          docker run \
            -v "${{ github.workspace }}/Back-end:/zap/wrk/:rw" \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html

          ZAP_EXIT=$?
          echo "ZAP scan exit code: $ZAP_EXIT"
          # ZAP exit codes:  0 = clean, 1 = FAIL alerts, 2 = WARN alerts.
          # Findings are captured in the uploaded reports; only fail on
          # actual scan errors (3+).
          if [ "$ZAP_EXIT" -ge 3 ]; then
            echo "ZAP encountered a fatal error."
            exit "$ZAP_EXIT"
          fi
          echo "ZAP scan completed — see uploaded reports for details."

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            report_json.json
            report_md.md
            report_html.html
          retention-days: 7


  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./Back-end
          file: ./Back-end/docker/Dockerfile
          push: false
          load: true
          tags: paysentineliq:ci

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: paysentineliq:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH


  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest

    needs:
      - test
      - codeql
      - docker

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: echo "Deploying..."