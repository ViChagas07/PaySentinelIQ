# ============================================================
# PaySentinelIQ — Railway Configuration (Repository Root)
# ============================================================
#
# Railway docs: https://docs.railway.com/deployments/monorepo
# Railpack docs: https://railpack.com/languages/python
#
# Este arquivo fica na RAIZ do repositório para que o Railway
# o encontre SEM precisar configurar "Root Directory".
#
# O BuildCommand instala as dependências do Back-end/ com Poetry,
# e o StartCommand executa o proxy main.py da raiz que redireciona
# para o app real em Back-end/app/main.py.
#
# ═══════════════════════════════════════════════════════════════
# RECOMENDAÇÃO (quando puder configurar no dashboard):
#   No Railway Dashboard → Settings → Root Directory = "Back-end/"
#   Assim este arquivo e o main.js de proxy poderão ser removidos.
# ═══════════════════════════════════════════════════════════════
# ============================================================

[build]
# Instala o Poetry e todas as dependências do projeto
buildCommand = "pip install --no-cache-dir poetry && cd Back-end && python -m poetry config virtualenvs.create false && python -m poetry install --no-root --no-interaction --no-ansi"

[deploy]
# Comando de start usando o proxy main.py da raiz
# Usa python -m uvicorn (garante PATH) em vez de uvicorn direto
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --ws-ping-interval 30 --ws-ping-timeout 10 --ws-max-size 1048576"

# Health check
healthcheckPath = "/health"

# Reinicialização automática
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
